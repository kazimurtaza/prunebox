services:
  prunebox:
    image: ghcr.io/kazimurtaza/prunebox:latest
    container_name: prunebox
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://prunebox:CHANGE_ME_POSTGRES_PASSWORD@postgres:5432/prunebox
      - POSTGRES_PASSWORD=CHANGE_ME_POSTGRES_PASSWORD
      - NODE_ENV=production
      - NEXTAUTH_URL=https://prunebox.example.com
      - NEXTAUTH_SECRET=CHANGE_ME_NEXTAUTH_SECRET
      - GOOGLE_CLIENT_ID=CHANGE_ME_GOOGLE_CLIENT_ID.apps.googleusercontent.com
      - GOOGLE_CLIENT_SECRET=CHANGE_ME_GOOGLE_CLIENT_SECRET
      - GOOGLE_OAUTH_SCOPES=gmail.readonly gmail.modify gmail.labels gmail.send
      - ENCRYPTION_KEY=CHANGE_ME_32_CHAR_ENCRYPTION_KEY
      - NEXT_PUBLIC_APP_URL=https://prunebox.example.com
      - NEXT_PUBLIC_APP_NAME=Prunebox
      - GMAIL_WEBHOOK_SECRET=CHANGE_ME_WEBHOOK_SECRET
      - ROLLUP_FROM_EMAIL=noreply@prunebox.local
      - ROLLUP_FROM_NAME=Prunebox Digest
      - MAX_FREE_UNSUBSCRIBES=10
      - FREE_SCAN_LIMIT=1000
      - MAX_EMAIL_SCAN_LIMIT=1000
      - MAX_FULL_SCAN_LIMIT=50000
    depends_on:
      - postgres
    volumes:
      - prunebox_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

  postgres:
    image: postgres:16-alpine
    container_name: prunebox_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: prunebox
      POSTGRES_PASSWORD: CHANGE_ME_POSTGRES_PASSWORD
      POSTGRES_DB: prunebox
    volumes:
      - prunebox_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prunebox"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  prunebox_postgres:
