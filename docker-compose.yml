# Prunebox - Self-hosted email cleanup tool
# Quick start: cp .env.example .env (edit values) && docker-compose up -d

services:
  prunebox:
    image: ghcr.io/kazimurtaza/prunebox:latest
    container_name: prunebox
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      - redis
      - postgres
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

  redis:
    image: redis:7-alpine
    container_name: prunebox_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - prunebox_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  postgres:
    image: postgres:16-alpine
    container_name: prunebox_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: prunebox
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: prunebox
    volumes:
      - prunebox_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prunebox"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  prunebox_postgres:
  prunebox_redis:
