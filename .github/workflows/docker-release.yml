name: Docker Release

on:
  push:
    branches: [master]
    tags:
      - '**'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0)'
        required: true
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/kazimurtaza/prunebox

jobs:
  # Gracefully skip if triggered on wrong branch (e.g., due to branch tracking misconfiguration)
  validate-branch:
    runs-on: ubuntu-latest
    if: ${{ github.ref_type == 'branch' && github.ref_name != 'master' && !startsWith(github.ref, 'refs/tags/') }}
    steps:
      - name: Skip release workflow
        run: |
          echo "::warning::Release workflow triggered on ${{ github.ref_name }} instead of master. Skipping gracefully."
          echo "This usually means branch tracking is misconfigured."

  build-and-push:
    runs-on: ubuntu-latest
    # Only run on master branch or tags
    if: ${{ github.ref_name == 'master' || startsWith(github.ref, 'refs/tags/') }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            # Branch name (master → :master)
            type=ref,event=branch
            # Tag name (v1.0.0 → :v1.0.0, develop → :develop)
            type=ref,event=tag
            # Semver tags (v1.0.0 → :v1.0, :1.0)
            type=semver,pattern=v{{version}}
            type=semver,pattern={{version}}
            type=semver,pattern=v{{major}}.{{minor}}
            type=semver,pattern={{major}}.{{minor}}
            # Latest tag only for master branch or version tags
            type=raw,value=latest,enable=${{ github.ref_name == 'master' || startsWith(github.ref, 'refs/tags/v') }}
          labels: |
            org.opencontainers.image.title=Prunebox Release
            org.opencontainers.image.description=Production build of Prunebox

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  create-release:
    needs: build-and-push
    # Only create GitHub releases for version tags (v1.0.0), not for arbitrary tags or branches
    if: ${{ startsWith(github.ref, 'refs/tags/v') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
