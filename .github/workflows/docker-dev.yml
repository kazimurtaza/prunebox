name: Docker Dev

on:
  push:
    branches: [develop]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/kazimurtaza/prunebox

jobs:
  # Gracefully skip if triggered on wrong branch
  validate-branch:
    runs-on: ubuntu-latest
    if: ${{ github.ref_type == 'branch' && github.ref_name != 'develop' }}
    steps:
      - name: Skip dev workflow
        run: |
          echo "::warning::Dev workflow triggered on ${{ github.ref_name }} instead of develop. Skipping gracefully."

  build-and-push:
    runs-on: ubuntu-latest
    # Only run on develop branch
    if: ${{ github.ref_name == 'develop' }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=
          labels: |
            org.opencontainers.image.title=Prunebox Dev
            org.opencontainers.image.description=Development build of Prunebox

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
